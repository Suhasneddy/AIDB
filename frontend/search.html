<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search - AIDB</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: #0F1419;
            color: #E5E7EB;
            padding-bottom: 80px;
        }

        .header {
            padding: 20px;
            background: #1A1F2E;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .search-box {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .back-btn {
            font-size: 1.3em;
            cursor: pointer;
            color: #3B82F6;
        }

        .search-input {
            flex: 1;
            padding: 12px 16px;
            background: #0F1419;
            border: 1px solid #374151;
            border-radius: 10px;
            color: white;
            font-size: 1em;
            outline: none;
        }

        .search-input:focus {
            border-color: #2563EB;
        }

        .search-btn {
            padding: 12px 24px;
            background: #2563EB;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
        }

        .quick-filters {
            display: flex;
            gap: 10px;
            padding: 15px 20px;
            overflow-x: auto;
        }

        .quick-filters::-webkit-scrollbar {
            display: none;
        }

        .filter-chip {
            padding: 8px 16px;
            background: #1A1F2E;
            border: 1px solid #374151;
            border-radius: 20px;
            color: #E5E7EB;
            cursor: pointer;
            white-space: nowrap;
            font-size: 0.9em;
        }

        .filter-chip:hover {
            border-color: #2563EB;
            color: #3B82F6;
        }

        .results-container {
            padding: 20px;
        }

        .result-card {
            background: #1A1F2E;
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .result-card:hover {
            background: #252B3B;
            transform: translateX(5px);
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 10px;
        }

        .result-title {
            font-size: 1.2em;
            font-weight: 600;
            color: #3B82F6;
        }

        .result-score {
            background: #2563EB;
            color: white;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .result-desc {
            color: #D1D5DB;
            line-height: 1.5;
            margin: 10px 0;
        }

        .result-stats {
            display: flex;
            gap: 15px;
            font-size: 0.9em;
            color: #9CA3AF;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6B7280;
        }

        .empty-icon {
            font-size: 4em;
            margin-bottom: 20px;
        }

        .empty-text {
            font-size: 1.2em;
            margin-bottom: 10px;
        }

        .empty-hint {
            font-size: 0.95em;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #9CA3AF;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #1A1F2E;
            border-top: 1px solid #374151;
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            color: #6B7280;
            font-size: 0.85em;
        }

        .nav-item.active {
            color: #3B82F6;
        }

        .nav-icon {
            font-size: 1.5em;
        }
    </style>
</head>

<body>
    <div class="header">
        <div class="search-box">
            <div class="back-btn" onclick="window.location.href='home.html'">←</div>
            <input type="text" class="search-input" id="searchInput" placeholder="Search AI tools, repos, or topics..."
                onkeypress="handleKeyPress(event)">
            <button class="search-btn" onclick="performSearch()">Search</button>
        </div>
    </div>

    <div class="quick-filters">
        <div class="filter-chip" onclick="quickSearch('llm')">🤖 LLMs</div>
        <div class="filter-chip" onclick="quickSearch('computer-vision')">👁️ Vision</div>
        <div class="filter-chip" onclick="quickSearch('nlp')">💬 NLP</div>
        <div class="filter-chip" onclick="quickSearch('transformers')">⚡ Transformers</div>
        <div class="filter-chip" onclick="quickSearch('pytorch')">🔥 PyTorch</div>
        <div class="filter-chip" onclick="quickSearch('tensorflow')">🧠 TensorFlow</div>
    </div>

    <div class="results-container" id="resultsContainer">
        <div class="empty-state">
            <div class="empty-icon">🔍</div>
            <div class="empty-text">Search for AI Tools</div>
            <div class="empty-hint">Try searching for "llm", "vision", or "nlp"</div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item" onclick="window.location.href='home.html'">
            <div class="nav-icon">🏠</div>
            <div>Home</div>
        </div>
        <div class="nav-item" onclick="window.location.href='rankings.html'">
            <div class="nav-icon">📊</div>
            <div>Top 50</div>
        </div>
        <div class="nav-item">
            <div class="nav-icon">✨</div>
            <div>New</div>
        </div>
        <div class="nav-item active">
            <div class="nav-icon">🔍</div>
            <div>Search</div>
        </div>
    </div>

    <script>
        // ⚡ CHANGE THIS to your Render.com URL after deploying backend!
        const API_URL = 'https://ai-discovery.onrender.com';

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                performSearch();
            }
        }

        function quickSearch(query) {
            document.getElementById('searchInput').value = query;
            performSearch();
        }

        async function performSearch() {
            const query = document.getElementById('searchInput').value.trim();
            const container = document.getElementById('resultsContainer');

            if (!query) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🔍</div>
                        <div class="empty-text">Search for AI Tools</div>
                        <div class="empty-hint">Try searching for "llm", "vision", or "nlp"</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = '<div class="loading">Searching...</div>';

            try {
                const response = await fetch(`${API_URL}/api/rankings?query=${encodeURIComponent(query)}&limit=30`);
                const data = await response.json();

                if (data.success && data.data.length > 0) {
                    container.innerHTML = data.data.map(tool => `
                        <div class="result-card" onclick="viewTool('${tool.full_name}')">
                            <div class="result-header">
                                <div class="result-title">${tool.name}</div>
                                <div class="result-score">★ ${(tool.BoostedScore * 10).toFixed(1)}</div>
                            </div>
                            <div class="result-desc">${tool.description || 'No description available'}</div>
                            <div class="result-stats">
                                <span>⭐ ${(tool.stars || 0).toLocaleString()} stars</span>
                                <span>🍴 ${(tool.forks || 0).toLocaleString()} forks</span>
                                ${tool.language ? `<span>💻 ${tool.language}</span>` : ''}
                            </div>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">😕</div>
                            <div class="empty-text">No results found</div>
                            <div class="empty-hint">Try a different search term</div>
                        </div>
                    `;
                }
            } catch (error) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">⚠️</div>
                        <div class="empty-text">Search Error</div>
                        <div class="empty-hint">Make sure the backend server is running</div>
                    </div>
                `;
                console.error(error);
            }
        }

        function viewTool(fullName) {
            window.location.href = `tool-detail.html?tool=${encodeURIComponent(fullName)}`;
        }

        // Auto-focus search input
        document.getElementById('searchInput').focus();
    </script>
    <!-- Analytics Tracking -->
    <script>
        fetch('https://ai-discovery.onrender.com/api/analytics/track', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ page: 'search', referrer: document.referrer })
        }).catch(() => { });
    </script>
</body>

</html>
