<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compare AI Tools - AIDB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'primary': '#0a2461',
                        'secondary': '#3E92CC',
                        'bg-dark': '#0a0d14',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .comparison-table {
            border-collapse: separate;
            border-spacing: 0;
            width: 100%;
            border: 1px solid #374151;
            border-radius: 12px;
            overflow: hidden;
        }

        .comparison-table th {
            background: #1e293b;
            padding: 1.5rem 1rem;
            text-align: center;
            border-bottom: 2px solid #374151;
            font-weight: 600;
        }

        .comparison-table td {
            padding: 1rem;
            border-bottom: 1px solid #1f2937;
            background: #0f172a;
        }

        .comparison-table tr:last-child td {
            border-bottom: none;
        }

        .row-label {
            background: #1a1f2e !important;
            font-weight: 600;
            color: #9ca3af;
            width: 180px;
        }

        .section-header {
            background: #1e293b !important;
            font-weight: 700;
            color: #60a5fa;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
        }
        
        .category-btn.active {
            background: #3E92CC !important;
        }
    </style>
</head>

<body class="bg-bg-dark text-white min-h-screen">

    <!-- Header -->
    <header class="sticky top-0 z-50 backdrop-blur-md bg-bg-dark/80 border-b border-gray-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center gap-4">
                    <button onclick="history.back()" class="text-2xl hover:text-secondary">←</button>
                    <h1 class="text-xl font-bold">Compare AI</h1>
                </div>
                <button onclick="addToolToCompare()"
                    class="bg-primary hover:bg-primary/90 px-4 py-2 rounded-lg font-semibold flex items-center gap-2">
                    <span class="material-icons text-sm">add</span>
                    Add Tool
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8">

        <!-- Tool Selector -->
        <div id="toolSelector" class="hidden mb-8 bg-gray-800 p-6 rounded-xl border border-gray-700">
            <h3 class="text-lg font-bold mb-4">Select Tools to Compare</h3>
            
            <!-- Category Filter -->
            <div class="mb-6">
                <label class="block text-sm font-semibold mb-3 text-gray-400">Filter by Category</label>
                <div class="flex flex-wrap gap-2">
                    <button onclick="filterCategory('all')" class="category-btn active px-4 py-2 rounded-lg bg-gray-700 hover:bg-gray-600 text-sm">All</button>
                    <button onclick="filterCategory('llm')" class="category-btn px-4 py-2 rounded-lg bg-gray-700 hover:bg-gray-600 text-sm">🤖 LLMs</button>
                    <button onclick="filterCategory('image-generation')" class="category-btn px-4 py-2 rounded-lg bg-gray-700 hover:bg-gray-600 text-sm">🎨 Image Gen</button>
                    <button onclick="filterCategory('video-ai')" class="category-btn px-4 py-2 rounded-lg bg-gray-700 hover:bg-gray-600 text-sm">🎬 Video AI</button>
                    <button onclick="filterCategory('code-ai')" class="category-btn px-4 py-2 rounded-lg bg-gray-700 hover:bg-gray-600 text-sm">💻 Code AI</button>
                    <button onclick="filterCategory('machine-learning')" class="category-btn px-4 py-2 rounded-lg bg-gray-700 hover:bg-gray-600 text-sm">🧠 ML</button>
                </div>
            </div>
            
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4" id="toolList">
                <!-- Will be populated dynamically -->
            </div>
            <div class="mt-4 flex justify-end gap-3">
                <button onclick="closeSelector()"
                    class="px-4 py-2 rounded-lg border border-gray-600 hover:bg-gray-700">Cancel</button>
                <button onclick="compareSelected()"
                    class="px-4 py-2 rounded-lg bg-secondary hover:bg-secondary/90 font-semibold">Compare</button>
            </div>
        </div>

        <!-- Comparison Table -->
        <div id="comparisonContainer" class="overflow-x-auto">
            <div class="text-center text-gray-500 py-20">
                <span class="material-icons text-6xl mb-4">compare_arrows</span>
                <p class="text-xl font-semibold mb-2">No tools selected</p>
                <p class="text-sm">Click "Add Tool" to start comparing AI tools</p>
            </div>
        </div>

        <!-- Action Buttons -->
        <div id="actionButtons" class="hidden mt-8 flex justify-end gap-4">
            <button onclick="shareComparison()"
                class="px-6 py-3 rounded-lg border border-gray-700 hover:bg-gray-800 font-semibold flex items-center gap-2">
                <span class="material-icons text-sm">share</span>
                Share Comparison
            </button>
            <button onclick="exportPDF()"
                class="px-6 py-3 rounded-lg bg-secondary hover:bg-secondary/90 font-semibold flex items-center gap-2">
                <span class="material-icons text-sm">download</span>
                Export Report (PDF)
            </button>
        </div>

    </main>

    <script>
        const API_URL = 'https://ai-discovery.onrender.com';
        let selectedTools = [];
        let comparisonTools = [];
        let allAvailableTools = [];
        let currentCategory = 'all';

        async function addToolToCompare() {
            document.getElementById('toolSelector').classList.remove('hidden');
            await loadAvailableTools();
        }

        function closeSelector() {
            document.getElementById('toolSelector').classList.add('hidden');
        }

        async function loadAvailableTools() {
            try {
                const response = await fetch(`${API_URL}/api/rankings?query=ai&limit=100`);
                const data = await response.json();

                if (data.success && data.data.length > 0) {
                    allAvailableTools = data.data;
                    filterCategory('all');
                }
            } catch (error) {
                console.error('Error loading tools:', error);
            }
        }

        function filterCategory(category) {
            currentCategory = category;
            
            // Update active button
            document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active', 'bg-secondary'));
            event.target.classList.add('active', 'bg-secondary');
            
            // Filter tools
            let filtered = allAvailableTools;
            if (category !== 'all') {
                filtered = allAvailableTools.filter(tool => matchesCategory(tool, category));
            }
            
            // Display filtered tools
            const toolList = document.getElementById('toolList');
            toolList.innerHTML = filtered.slice(0, 20).map((tool, idx) => `
                <label class="flex items-center gap-3 p-3 rounded-lg border border-gray-700 hover:border-secondary cursor-pointer transition">
                    <input type="checkbox" value="${tool.full_name}" onchange="toggleTool('${tool.full_name}', this.checked)" 
                           class="w-4 h-4 text-secondary bg-gray-700 border-gray-600 rounded focus:ring-secondary">
                    <div class="flex-1">
                        <div class="font-semibold text-sm">${tool.name}</div>
                        <div class="text-xs text-gray-400">${tool.language || 'AI Tool'}</div>
                    </div>
                </label>
            `).join('');
        }

        function matchesCategory(tool, category) {
            const topics = (tool.topics || []).map(t => t.toLowerCase()).join(' ');
            const name = (tool.name || '').toLowerCase();
            const desc = (tool.description || '').toLowerCase();
            const searchText = `${topics} ${name} ${desc}`;

            const categoryMap = {
                'llm': ['llm', 'gpt', 'language-model', 'chatgpt', 'transformer'],
                'image-generation': ['stable-diffusion', 'image-generation', 'dall-e', 'diffusion', 'image'],
                'video-ai': ['video-generation', 'text-to-video', 'video'],
                'code-ai': ['code-generation', 'copilot', 'coding', 'code-assistant'],
                'machine-learning': ['machine-learning', 'deep-learning', 'ml', 'neural-network', 'ai']
            };

            const keywords = categoryMap[category] || [category];
            return keywords.some(kw => searchText.includes(kw));
        }

        function toggleTool(fullName, checked) {
            if (checked && !selectedTools.includes(fullName)) {
                selectedTools.push(fullName);
            } else {
                selectedTools = selectedTools.filter(n => n !== fullName);
            }
        }

        function compareSelected() {
            if (selectedTools.length === 0) {
                alert('Please select at least 1 tool to compare');
                return;
            }

            if (selectedTools.length > 4) {
                alert('Maximum 4 tools can be compared at once');
                return;
            }

            comparisonTools = selectedTools.map(fullName => 
                allAvailableTools.find(t => t.full_name === fullName)
            ).filter(t => t);
            
            renderComparison();
            closeSelector();
            selectedTools = [];
        }

        function renderComparison() {
            if (comparisonTools.length === 0) return;

            const container = document.getElementById('comparisonContainer');
            document.getElementById('actionButtons').classList.remove('hidden');

            const colors = ['#06B6D4', '#8B5CF6', '#F59E0B'];

            container.innerHTML = `
        <table class="comparison-table">
            <thead>
                <tr>
                    <th class="row-label"></th>
                    ${comparisonTools.map((tool, idx) => `
                        <th>
                            <button onclick="removeTool(${idx})" class="float-right text-gray-500 hover:text-red-500 -mt-2">
                                <span class="material-icons text-sm">close</span>
                            </button>
                            <div class="w-16 h-16 rounded-xl mx-auto mb-3 flex items-center justify-center text-2xl font-bold" 
                                 style="background: ${colors[idx % colors.length]}">
                                ${tool.name.substring(0, 2).toUpperCase()}
                            </div>
                            <h3 class="font-bold text-lg mb-1">${tool.name}</h3>
                            <p class="text-xs text-gray-400">${tool.full_name || 'GitHub'}</p>
                        </th>
                    `).join('')}
                </tr>
            </thead>
            <tbody>
                <!-- Overview Section -->
                <tr>
                    <td colspan="${comparisonTools.length + 1}" class="section-header">📊 Overview</td>
                </tr>
                <tr>
                    <td class="row-label">Description</td>
                    ${comparisonTools.map(tool => `
                        <td><div class="text-sm text-gray-300">${tool.description || 'No description available'}</div></td>
                    `).join('')}
                </tr>
                <tr>
                    <td class="row-label">Best For</td>
                    ${comparisonTools.map(tool => `
                        <td><div class="text-sm">${tool.language ? `${tool.language} Development` : 'General AI Tasks'}</div></td>
                    `).join('')}
                </tr>
                
                <!-- Metrics Section -->
                <tr>
                    <td colspan="${comparisonTools.length + 1}" class="section-header">⭐ Metrics</td>
                </tr>
                <tr>
                    <td class="row-label">GitHub Stars</td>
                    ${comparisonTools.map(tool => `
                        <td><div class="font-bold text-lg">${(tool.stars || 0).toLocaleString()}</div></td>
                    `).join('')}
                </tr>
                <tr>
                    <td class="row-label">Forks</td>
                    ${comparisonTools.map(tool => `
                        <td><div class="font-semibold">${(tool.forks || 0).toLocaleString()}</div></td>
                    `).join('')}
                </tr>
                <tr>
                    <td class="row-label">AI Score</td>
                    ${comparisonTools.map(tool => `
                        <td>
                            <div class="flex items-center gap-2">
                                <div class="flex-1 bg-gray-700 h-2.5 rounded-full overflow-hidden">
                                    <div class="bg-gradient-to-r from-blue-500 to-purple-600 h-full" style="width: ${(tool.BoostedScore * 100)}%"></div>
                                </div>
                                <span class="font-bold">${(tool.BoostedScore * 10).toFixed(1)}</span>
                            </div>
                        </td>
                    `).join('')}
                </tr>
                
                <!-- Technical Section -->
                <tr>
                    <td colspan="${comparisonTools.length + 1}" class="section-header">🔧 Technical</td>
                </tr>
                <tr>
                    <td class="row-label">Language</td>
                    ${comparisonTools.map(tool => `
                        <td><span class="px-2 py-1 bg-blue-500/20 text-blue-400 rounded text-sm font-medium">${tool.language || 'Multiple'}</span></td>
                    `).join('')}
                </tr>
                <tr>
                    <td class="row-label">Contributors</td>
                    ${comparisonTools.map(tool => `
                        <td><div class="font-semibold">${tool.contributors_count || 'N/A'}</div></td>
                    `).join('')}
                </tr>
                <tr>
                    <td class="row-label">Open Source</td>
                    ${comparisonTools.map(() => `
                        <td><span class="material-icons text-green-500">check_circle</span></td>
                    `).join('')}
                </tr>
                
                <!-- Pros & Cons Section -->
                <tr>
                    <td colspan="${comparisonTools.length + 1}" class="section-header">✅ Pros</td>
                </tr>
                <tr>
                    <td class="row-label"></td>
                    ${comparisonTools.map(tool => `
                        <td>
                            <ul class="space-y-1.5 text-sm">
                                <li class="flex items-start gap-2">
                                    <span class="text-green-500 mt-0.5">✓</span>
                                    <span>High community engagement</span>
                                </li>
                                <li class="flex items-start gap-2">
                                    <span class="text-green-500 mt-0.5">✓</span>
                                    <span>${(tool.stars || 0).toLocaleString()} stars</span>
                                </li>
                                <li class="flex items-start gap-2">
                                    <span class="text-green-500 mt-0.5">✓</span>
                                    <span>Active development</span>
                                </li>
                            </ul>
                        </td>
                    `).join('')}
                </tr>
                <tr>
                    <td colspan="${comparisonTools.length + 1}" class="section-header">❌ Cons</td>
                </tr>
                <tr>
                    <td class="row-label"></td>
                    ${comparisonTools.map(() => `
                        <td>
                            <ul class="space-y-1.5 text-sm">
                                <li class="flex items-start gap-2">
                                    <span class="text-red-500 mt-0.5">✗</span>
                                    <span>Learning curve for beginners</span>
                                </li>
                                <li class="flex items-start gap-2">
                                    <span class="text-red-500 mt-0.5">✗</span>
                                    <span>Documentation needs improvement</span>
                                </li>
                            </ul>
                        </td>
                    `).join('')}
                </tr>
            </tbody>
        </table>
    `;
        }

        function removeTool(idx) {
            comparisonTools.splice(idx, 1);
            if (comparisonTools.length === 0) {
                document.getElementById('comparisonContainer').innerHTML = `
            <div class="text-center text-gray-500 py-20">
                <span class="material-icons text-6xl mb-4">compare_arrows</span>
                <p class="text-xl font-semibold mb-2">No tools selected</p>
                <p class="text-sm">Click "Add Tool" to start comparing AI tools</p>
            </div>
        `;
                document.getElementById('actionButtons').classList.add('hidden');
            } else {
                renderComparison();
            }
        }

        function shareComparison() {
            const toolNames = comparisonTools.map(t => t.name).join(' vs ');
            if (navigator.share) {
                navigator.share({
                    title: `AI Tool Comparison: ${toolNames}`,
                    text: `Check out this comparison of ${toolNames}`,
                    url: window.location.href
                });
            } else {
                alert(`Share this URL:\n${window.location.href}`);
            }
        }

        function exportPDF() {
            alert('PDF export feature - In a real app, this would generate a PDF report of the comparison');
        }
    </script>

</body>

</html>
