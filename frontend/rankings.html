<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Rankings - AIDB</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: #0F1419;
            color: #E5E7EB;
            padding-bottom: 80px;
        }

        .header {
            padding: 20px;
            background: #1A1F2E;
            display: flex;
            align-items: center;
            gap: 15px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .back-btn {
            font-size: 1.5em;
            cursor: pointer;
            color: #3B82F6;
        }

        .header-title {
            font-size: 1.5em;
            font-weight: 700;
            color: white;
        }

        .filters {
            display: flex;
            gap: 10px;
            padding: 15px 20px;
            overflow-x: auto;
        }

        .filters::-webkit-scrollbar {
            display: none;
        }

        .filter-btn {
            padding: 10px 20px;
            background: #1A1F2E;
            border: 1px solid #374151;
            border-radius: 20px;
            color: #E5E7EB;
            cursor: pointer;
            white-space: nowrap;
            font-size: 0.95em;
        }

        .filter-btn.active {
            background: #2563EB;
            border-color: #2563EB;
        }

        .repo-card {
            background: #1A1F2E;
            margin: 15px 20px;
            padding: 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .repo-card:hover {
            background: #252B3B;
            transform: translateY(-2px);
        }

        .repo-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .repo-icon {
            width: 48px;
            height: 48px;
            background: #374151;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
        }

        .repo-name {
            color: #3B82F6;
            font-size: 1.1em;
            font-weight: 600;
        }

        .public-badge {
            background: #059669;
            color: white;
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 0.75em;
            margin-left: auto;
        }

        .repo-stats {
            display: flex;
            gap: 20px;
            margin: 12px 0;
            font-size: 0.9em;
            color: #9CA3AF;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .repo-description {
            color: #D1D5DB;
            line-height: 1.5;
            margin: 12px 0;
        }

        .repo-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin: 12px 0;
        }

        .tag {
            background: #374151;
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 0.85em;
            color: #9CA3AF;
        }

        .repo-actions {
            display: flex;
            gap: 12px;
            margin-top: 15px;
        }

        .action-btn {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #374151;
            background: transparent;
            color: #E5E7EB;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.9em;
        }

        .action-btn.primary {
            background: #2563EB;
            border-color: #2563EB;
            color: white;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #9CA3AF;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #1A1F2E;
            border-top: 1px solid #374151;
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            color: #6B7280;
            font-size: 0.85em;
        }

        .nav-item.active {
            color: #3B82F6;
        }

        .nav-icon {
            font-size: 1.5em;
        }
    </style>
</head>

<body>
    <div class="header">
        <div class="back-btn" onclick="window.location.href='index.html'">←</div>
        <div class="header-title">GitHub AI Repos</div>
    </div>

    <div class="filters">
        <button class="filter-btn active" onclick="loadRepos('machine-learning')">📋 Most Stars</button>
        <button class="filter-btn" onclick="loadRepos('llm')">🔥 Trending</button>
        <button class="filter-btn" onclick="loadRepos('computer-vision')">🆕 New</button>
    </div>

    <div id="reposContainer">
        <div class="loading">Loading repositories...</div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item" onclick="window.location.href='index.html'">
            <div class="nav-icon">🏠</div>
            <div>Home</div>
        </div>
        <div class="nav-item active">
            <div class="nav-icon">📊</div>
            <div>Top 50</div>
        </div>
        <div class="nav-item">
            <div class="nav-icon">✨</div>
            <div>New</div>
        </div>
        <div class="nav-item" onclick="window.location.href='search.html'">
            <div class="nav-icon">🔍</div>
            <div>Search</div>
        </div>
    </div>

    <script>
        // ⚡ CHANGE THIS to your Render.com URL after deploying backend!
        const API_URL = (location.hostname === 'localhost' || location.hostname === '127.0.0.1') ? 'http://localhost:8000' : '';

        async function loadRepos(query = 'machine-learning') {
            const container = document.getElementById('reposContainer');
            container.innerHTML = '<div class="loading">Loading repositories...</div>';

            try {
                const response = await fetch(`${API_URL}/api/rankings?query=${query}&limit=30`);
                const data = await response.json();

                if (data.success && data.data.length > 0) {
                    container.innerHTML = data.data.map(repo => `
                        <div class="repo-card" onclick="viewTool('${repo.full_name}')">
                            <div class="repo-header">
                                <div class="repo-icon">📦</div>
                                <div>
                                    <div class="repo-name">${repo.full_name || repo.name}</div>
                                </div>
                                <div class="public-badge">PUBLIC</div>
                            </div>

                            <div class="repo-stats">
                                <div class="stat-item">⭐ ${(repo.stars || 0).toLocaleString()}</div>
                                <div class="stat-item">🔱 ${(repo.forks || 0).toLocaleString()}</div>
                                ${repo.language ? `<div class="stat-item">● ${repo.language}</div>` : ''}
                            </div>

                            <div class="repo-description">
                                ${repo.description || 'No description available'}
                            </div>

                            <div class="repo-tags">
                                ${repo.topics ? repo.topics.slice(0, 3).map(tag => `<span class="tag">${tag}</span>`).join('') : ''}
                                ${repo.IsBoosted ? '<span class="tag" style="background:#F59E0B; color:white;">🚀 Boosted</span>' : ''}
                            </div>

                            <div class="repo-actions">
                                <button class="action-btn" onclick="event.stopPropagation(); window.open('${repo.url}', '_blank')">
                                    <span>&lt;/&gt;</span> View Code
                                </button>
                                <button class="action-btn primary" onclick="event.stopPropagation(); viewTool('${repo.full_name}')">
                                    ⚡ Live Demo
                                </button>
                            </div>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<div class="loading">No repositories found</div>';
                }
            } catch (error) {
                container.innerHTML = '<div class="loading">Error loading repositories. Make sure backend is running.</div>';
                console.error(error);
            }
        }

        function viewTool(fullName) {
            window.location.href = `tool.html?tool=${encodeURIComponent(fullName)}`;
        }

        // Update active filter button
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function () {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
            });
        });

        // Load initial data
        loadRepos();
    </script>

    <!-- Floating Chat Button -->
    <a href="chatbot.html" title="Ask AI Assistant"
        style="position:fixed;bottom:80px;right:24px;z-index:999;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:28px;text-decoration:none;box-shadow:0 8px 30px rgba(99,102,241,0.4);transition:transform 0.2s;"
        onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">🤖</a>

</body>

</html>
