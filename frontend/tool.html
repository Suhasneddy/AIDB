<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tool Details - AIDB</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: #0F1419;
            color: #E5E7EB;
            padding-bottom: 80px;
        }

        .header {
            padding: 20px;
            background: #1A1F2E;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .back-btn {
            font-size: 1.5em;
            cursor: pointer;
            color: #3B82F6;
        }

        .rating-badge {
            background: #2563EB;
            color: white;
            padding: 6px 12px;
            border-radius: 8px;
            font-weight: 600;
        }

        .tool-hero {
            text-align: center;
            padding: 40px 20px;
        }

        .tool-logo {
            width: 120px;
            height: 120px;
            background: #1E3A8A;
            border-radius: 24px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
            color: white;
        }

        .tool-title {
            font-size: 2em;
            font-weight: 700;
            color: white;
            margin-bottom: 8px;
        }

        .tool-author {
            color: #9CA3AF;
            font-size: 1.1em;
        }

        .tool-badges {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .badge {
            background: #374151;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 0.9em;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 0 20px;
            margin: 30px 0;
        }

        .stat-box {
            background: #1A1F2E;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-label {
            color: #9CA3AF;
            font-size: 0.9em;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 1.8em;
            font-weight: 700;
            color: white;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            padding: 0 20px;
            margin: 20px 0;
        }

        .btn {
            flex: 1;
            padding: 15px;
            border-radius: 10px;
            border: none;
            font-weight: 600;
            font-size: 1em;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: #2563EB;
            color: white;
        }

        .btn-secondary {
            background: transparent;
            color: #E5E7EB;
            border: 1px solid #374151;
        }

        .section {
            padding: 20px;
            margin: 20px 0;
        }

        .section-title {
            font-size: 1.3em;
            font-weight: 700;
            margin-bottom: 15px;
            color: white;
        }

        .description-text {
            color: #D1D5DB;
            line-height: 1.6;
            font-size: 1em;
        }

        .features-list {
            list-style: none;
        }

        .features-list li {
            background: #1A1F2E;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            color: #D1D5DB;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .features-list li::before {
            content: "✓";
            color: #10B981;
            font-weight: 700;
            font-size: 1.2em;
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #9CA3AF;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #1A1F2E;
            border-top: 1px solid #374151;
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            color: #6B7280;
            font-size: 0.85em;
        }

        .nav-icon {
            font-size: 1.5em;
        }
    </style>
</head>

<body>
    <div class="header">
        <div class="back-btn" onclick="history.back()">←</div>
        <div class="rating-badge" id="ratingBadge">★ 9.5/10</div>
    </div>

    <div id="toolContent">
        <div class="loading">Loading tool details...</div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item" onclick="window.location.href='home.html'">
            <div class="nav-icon">🏠</div>
            <div>Home</div>
        </div>
        <div class="nav-item" onclick="window.location.href='rankings.html'">
            <div class="nav-icon">📊</div>
            <div>Top 50</div>
        </div>
        <div class="nav-item">
            <div class="nav-icon">✨</div>
            <div>New</div>
        </div>
        <div class="nav-item" onclick="window.location.href='search.html'">
            <div class="nav-icon">🔍</div>
            <div>Search</div>
        </div>
    </div>

    <script>
        // ⚡ CHANGE THIS to your Render.com URL after deploying backend!
        const API_URL = (location.hostname === 'localhost' || location.hostname === '127.0.0.1') ? 'http://localhost:8000' : '';

        async function loadToolDetails() {
            const urlParams = new URLSearchParams(window.location.search);
            const toolName = urlParams.get('tool');

            if (!toolName) {
                document.getElementById('toolContent').innerHTML = '<div class="loading">No tool specified</div>';
                return;
            }

            try {
                // Fetch tool data
                const response = await fetch(`${API_URL}/api/rankings?query=${encodeURIComponent(toolName)}&limit=1`);
                const data = await response.json();

                if (data.success && data.data.length > 0) {
                    const tool = data.data[0];
                    displayTool(tool);
                } else {
                    document.getElementById('toolContent').innerHTML = '<div class="loading">Tool not found</div>';
                }
            } catch (error) {
                document.getElementById('toolContent').innerHTML = '<div class="loading">Error loading tool details</div>';
                console.error(error);
            }
        }

        function displayTool(tool) {
            const rating = (tool.BoostedScore * 10).toFixed(1);
            document.getElementById('ratingBadge').textContent = `★ ${rating}/10`;

            const content = `
                <div class="tool-hero">
                    <div class="tool-logo">
                        ${tool.name.substring(0, 2).toUpperCase()}
                    </div>
                    <h1 class="tool-title">${tool.name}</h1>
                    <p class="tool-author">by ${tool.full_name ? tool.full_name.split('/')[0] : 'Unknown'}</p>

                    <div class="tool-badges">
                        ${tool.language ? `<span class="badge">${tool.language}</span>` : ''}
                        <span class="badge">Open Source</span>
                        ${tool.IsBoosted ? '<span class="badge" style="background:#F59E0B;">🚀 Trending</span>' : ''}
                    </div>
                </div>

                <div class="stats-grid">
                    <div class="stat-box">
                        <div class="stat-label">STARS</div>
                        <div class="stat-value">${(tool.stars || 0).toLocaleString()}</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">FORKS</div>
                        <div class="stat-value">${(tool.forks || 0).toLocaleString()}</div>
                    </div>
                    ${tool.contributors_count ? `
                    <div class="stat-box">
                        <div class="stat-label">CONTRIBUTORS</div>
                        <div class="stat-value">${tool.contributors_count}</div>
                    </div>
                    ` : ''}
                    <div class="stat-box">
                        <div class="stat-label">SCORE</div>
                        <div class="stat-value">${rating}</div>
                    </div>
                </div>

                <div class="action-buttons">
                    <button class="btn btn-primary" onclick="window.open('${tool.url}', '_blank')">
                        🌐 Visit Website
                    </button>
                    <button class="btn btn-secondary" onclick="shareTool()">
                        🔗 Share
                    </button>
                </div>

                <div class="section">
                    <h2 class="section-title">Description</h2>
                    <p class="description-text">
                        ${tool.description || 'This is a powerful AI tool available on GitHub. It has gained significant traction in the developer community and continues to evolve with regular updates and contributions.'}
                    </p>
                </div>

                <div class="section">
                    <h2 class="section-title">Key Features</h2>
                    <ul class="features-list">
                        <li>Active development with ${tool.commits_last_month || 'regular'} commits last month</li>
                        <li>Strong community with ${(tool.stars || 0).toLocaleString()} stars</li>
                        ${tool.language ? `<li>Built with ${tool.language}</li>` : ''}
                        <li>Open source and free to use</li>
                        ${tool.IsBoosted ? '<li>Fast-growing and trending in the community</li>' : ''}
                    </ul>
                </div>

                ${tool.topics && tool.topics.length > 0 ? `
                <div class="section">
                    <h2 class="section-title">Topics</h2>
                    <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                        ${tool.topics.map(topic => `<span class="badge">${topic}</span>`).join('')}
                    </div>
                </div>
                ` : ''}
            `;

            document.getElementById('toolContent').innerHTML = content;
        }

        function shareTool() {
            if (navigator.share) {
                navigator.share({
                    title: 'Check out this AI tool!',
                    url: window.location.href
                });
            } else {
                alert('Share feature not supported. Copy this URL: ' + window.location.href);
            }
        }

        loadToolDetails();
    </script>

    <!-- Floating Chat Button -->
    <a href="chatbot.html" title="Ask AI Assistant"
        style="position:fixed;bottom:80px;right:24px;z-index:999;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:28px;text-decoration:none;box-shadow:0 8px 30px rgba(99,102,241,0.4);transition:transform 0.2s;"
        onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">🤖</a>

</body>

</html>
