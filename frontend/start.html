<!DOCTYPE html>
<html>

<head>
    <title>AI Discovery - Navigation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #0F1419;
            color: white;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 15px;
            margin: 20px 0;
        }

        a {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 10px;
            margin: 10px 10px 10px 0;
            font-weight: bold;
        }

        a:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.5);
        }

        .status {
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
        }

        .online {
            background: #10b981;
        }

        .offline {
            background: #ef4444;
        }
    </style>
</head>

<body>
    <h1>🚀 AI Discovery Platform</h1>

    <div class="card">
        <h2>Backend Status</h2>
        <div id="status" class="status">Checking...</div>
    </div>

    <div class="card">
        <h2>📄 Available Pages</h2>
        <a href="index.html">🏠 Homepage</a>
        <a href="discover.html">🔍 Discovery Page (NEW!)</a>
        <a href="rankings.html">📊 Rankings</a>
    </div>

    <div class="card">
        <h2>🔧 Quick Start</h2>
        <ol>
            <li>Make sure backend is running (see status above)</li>
            <li>Click "🔍 Discovery Page" button</li>
            <li>Use filters to find AI tools!</li>
        </ol>
    </div>

    <script>
        async function checkBackend() {
            try {
                const response = await fetch('/api/rankings?query=ai&limit=1');
                const data = await response.json();
                document.getElementById('status').innerHTML =
                    `<span class="online">✅ Backend Online - ${data.message}</span>`;
            } catch (error) {
                document.getElementById('status').innerHTML =
                    `<span class="offline">❌ Backend Offline - Please run: cd backend && python main.py</span>`;
            }
        }
        checkBackend();
    </script>
</body>

</html>
